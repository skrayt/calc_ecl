services:
  - type: web
    name: calc-ecl
    runtime: python
    # 依存パッケージインストール + matplotlibフォントキャッシュ事前構築（起動タイムアウト防止）
    buildCommand: "pip install -r requirements-web.txt && python -c \"import japanize_matplotlib; import matplotlib.font_manager\""
    startCommand: python main.py
    envVars:
      - key: FLET_WEB
        value: "1"
      - key: DATABASE_URL
        sync: false  # Render dashboardで手動設定（接続文字列を貼り付ける）
      - key: DB_SCHEMA
        value: calc_ecl
      - key: DB_SSLMODE
        value: require
