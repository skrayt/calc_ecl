services:
  - type: web
    name: calc-ecl
    runtime: python
    # 依存パッケージインストール
    # 注: japanize_matplotlibはPython 3.12非対応(distutils削除)のためimport不可
    #     フォントファイル(ipaexg.ttf)はパッケージから直接パスで登録する（plot_utils.py参照）
    buildCommand: "pip install -r requirements-web.txt"
    startCommand: python main.py
    envVars:
      - key: FLET_WEB
        value: "1"
      - key: DATABASE_URL
        sync: false  # Render dashboardで手動設定（接続文字列を貼り付ける）
      - key: DB_SCHEMA
        value: calc_ecl
      - key: DB_SSLMODE
        value: require
